<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b71ff" />
    <title>Deep Tech — Virtual Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="shortcut icon" href="assets/deeptechlogo.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Tajawal:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  </head>
  <body data-open="true">
    <main class="card">
      <header class="card-header">
        <div class="logo-wrap">
          <img src="assets/TMBlogo.png" alt="TMB" id="logo" onerror="this.style.opacity=0.0" />
        </div>
        
        <p class="intro">بيع وتركيب كاميرات المراقبة وأنظمة الأمن</p>

      </header>

      <section class="status-row">
        <div class="status-badge-container">
          <div id="openBadge" class="badge badge-open">Open | مفتوح</div>
          <div class="working-hours">08:00 AM - 06:00 PM</div>
        </div>
        <div class="common-actions">
          <a id="emailLink" class="btn-shared" href="#" title="Email">
            <i class="bi bi-envelope-fill"></i>
            <span>Gmail</span>
          </a>
          <a id="facebookLink" class="btn-shared" href="#" target="_blank" rel="noopener" title="Facebook">
            <i class="bi bi-facebook"></i>
            <span>Facebook</span>
          </a>
        </div>
      </section>

      <section class="card-body">
        
        <h2 class="section-title">Our Branches | فروعنا 🏢</h2>

        <div class="branches-container">
          <!-- Branch 1 -->
          <div class="branch-card">
            <h3 class="branch-name">الأغواط — Laghouat</h3>
            <div class="branch-grid">
              <a id="mapsLink1" class="branch-action" href="#" target="_blank" rel="noopener">
                <i class="bi bi-geo-alt-fill"></i>
                <span>Map</span>
              </a>
              <a id="whatsappLink1" class="branch-action" href="#" target="_blank" rel="noopener">
                <i class="bi bi-whatsapp"></i>
                <span>WhatsApp</span>
              </a>
              <a id="phoneLink1" class="branch-action" href="#">
                <i class="bi bi-telephone-fill"></i>
                <span>Call</span>
              </a>
            </div>
          </div>

          <!-- Branch 2 -->
          <div class="branch-card">
            <h3 class="branch-name">أفلو — Aflou</h3>
            <div class="branch-grid">
              <a id="mapsLink2" class="branch-action" href="#" target="_blank" rel="noopener">
                <i class="bi bi-geo-alt-fill"></i>
                <span>Map</span>
              </a>
              <a id="whatsappLink2" class="branch-action" href="#" target="_blank" rel="noopener">
                <i class="bi bi-whatsapp"></i>
                <span>WhatsApp</span>
              </a>
              <a id="phoneLink2" class="branch-action" href="#">
                <i class="bi bi-telephone-fill"></i>
                <span>Call</span>
              </a>
            </div>
          </div>
        </div>
      </section>


      <footer class="card-footer">
        <small class="note">
            &copy; TMB SECURITY SOLUTIONS 2017
        </small>
      </footer>
    </main>

    <script src="assets/script.js"></script>
  </body>
</html>
