<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — TMB Security</title>
    <link rel="stylesheet" href="./assets/styles.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            background: var(--bg-gradient);
            color: white;
            font-family: 'Poppins', sans-serif;
        }
        .container {
            padding: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px;
        }
        h1 { font-size: 64px; margin: 0; color: var(--primary-color); }
        p { margin-bottom: 30px; opacity: 0.8; }
        .btn-home {
            display: inline-block;
            padding: 12px 24px;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            transition: var(--transition);
        }
        .btn-home:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>Sorry, the page you are looking for does not exist.</p>
        <p dir="rtl">عذراً، الصفحة التي تبحث عنها غير موجودة.</p>
        <a href="index.html" class="btn-home">Return Home | العودة للرئيسية</a>
    </div>
</body>
</html>
